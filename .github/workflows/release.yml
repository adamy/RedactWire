name: release

# Publish to NuGet when a version tag is pushed (e.g. v0.1.0).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for deterministic / source-link builds

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore -p:Version=${{ steps.ver.outputs.version }}
      - run: dotnet test -c Release --no-build

      - name: Pack
        run: >
          dotnet pack src/RedactWire/RedactWire.csproj
          -c Release --no-build
          -p:Version=${{ steps.ver.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          -o artifacts

      - name: NuGet login (Trusted Publishing, OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate


      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*
