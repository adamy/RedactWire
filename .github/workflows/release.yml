name: release

# Publish to NuGet — manual only (Actions → release → Run workflow).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.4.0)'
        required: true
        default: '0.4.0'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # NuGet Trusted Publishing (OIDC)

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for deterministic / source-link builds

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        run: echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore -p:Version=${{ steps.ver.outputs.version }}
      - run: dotnet test -c Release --no-build

      - name: Pack
        run: |
          for proj in src/RedactWire/RedactWire.csproj src/RedactWire.Structured/RedactWire.Structured.csproj; do
            dotnet pack "$proj" -c Release --no-build \
              -p:Version=${{ steps.ver.outputs.version }} \
              -p:ContinuousIntegrationBuild=true \
              -o artifacts
          done

      - name: NuGet login (Trusted Publishing, OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate


      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*
